<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema | CRM</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Los mismos colores de tu imagen */
        body { background-color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .header-custom { 
            background-color: #2c3e50; /* El azul grisáceo de tu captura */
            color: white; 
            padding: 20px 0;
            text-align: center;
        }
        
        .nav-custom { 
            background-color: #34495e; 
            padding: 10px 0; 
            margin-bottom: 30px;
        }

        .login-container { max-width: 450px; margin-top: 50px; }
        
        .card-login {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .btn-ingresar {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 10px;
            font-weight: bold;
        }
        .btn-ingresar:hover { background-color: #1a252f; color: white; }
        
        h2 { font-weight: bold; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; margin-bottom: 25px; }
    </style>
</head>
<body>

<!-- Encabezado igual a tu imagen -->
<header class="header-custom shadow-sm">
    <h1 class="h3 mb-0">CRM Contact Center 📞</h1>
</header>

<!-- Barra de navegación (estética pero desactivada en login) -->
<nav class="nav-custom shadow-sm">
    <div class="container">
        <span class="text-white-50 small">Acceso Restringido para Personal Autorizado</span>
    </div>
</nav>

<div class="container login-container">
    
    <!-- Alertas de Flash (Mensajes de error o éxito) -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info py-2" style="font-size: 0.9rem;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="card-login">
        <h2 class="text-center">Iniciar Sesión</h2>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="mb-3">
                <label class="form-label fw-bold">Email:</label>
                <input type="email" name="email" class="form-control" placeholder="nombre@correo.com" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Contraseña:</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-ingresar shadow-sm">Ingresar</button>
            </div>

            <div class="text-center mt-4">
                <p class="text-muted small">¿No tienes cuenta? <a href="{{ url_for('auth.register') }}" class="text-decoration-none">Crear cuenta</a></p>
            </div>
        </form>
    </div>

    <div class="text-center mt-5">
        <p class="text-muted" style="font-size: 0.8rem;">Sistema en construcción 🚀</p>
    </div>
</div>

</body>
</html>
