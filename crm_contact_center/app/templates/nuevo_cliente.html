<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Nuevo Cliente | CRM</title>
    
    <!-- Bootstrap 5 y FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Estilo oficial de tu CRM */
        body { background-color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .header-custom { 
            background-color: #2c3e50; 
            color: white; 
            padding: 20px 0;
            text-align: center;
        }
        
        .nav-custom { 
            background-color: #34495e; 
            padding: 10px 0; 
            margin-bottom: 30px;
        }

        .nav-link { color: rgba(255,255,255,0.8) !important; font-weight: 600; margin: 0 10px; }
        .nav-link:hover { color: white !important; }
        .active-nav { border-bottom: 2px solid #ffffff; color: white !important; }

        .form-container { max-width: 500px; margin-top: 20px; }
        .card-form {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        h2 { 
            font-weight: bold; 
            border-bottom: 2px solid #2c3e50; 
            padding-bottom: 10px; 
            margin-bottom: 25px; 
            color: #2c3e50;
            text-align: center; 
        }

        .btn-guardar {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 12px;
            font-weight: bold;
            width: 100%;
        }
        .btn-guardar:hover { background-color: #1a252f; color: white; }
        
        .form-label { font-weight: bold; color: #555; font-size: 0.9rem; }
    </style>
</head>
<body>

<!-- Encabezado Oficial -->
<header class="header-custom shadow-sm">
    <h1 class="h3 mb-0">CRM Contact Center 📞</h1>
</header>

<!-- Navegación Consistente -->
<nav class="nav-custom shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="navbar-nav d-flex flex-row">
            <a class="nav-link" href="{{ url_for('inicio') }}">Inicio</a>
            <a class="nav-link active-nav" href="{{ url_for('clientes.lista_clientes') }}">Clientes</a>
            <a class="nav-link" href="#">Llamadas</a>
            <a class="nav-link" href="{{ url_for('dashboard.home') }}">Reporte</a>
        </div>
        <div class="text-white-50 small">
            Usuario: <strong class="text-white">{{ session['usuario'] }}</strong>
        </div>
    </div>
</nav>

<div class="container form-container">
    <div class="card-form">
        <!-- Título Estilizado -->
        <h2>Nuevo Cliente</h2>
        <p class="text-muted text-center small mb-4">Complete los datos para registrar un nuevo prospecto.</p>

        <form method="POST" action="{{ url_for('clientes.nuevo_cliente') }}">
            <!-- Campo Nombre -->
            <div class="mb-3">
                <label class="form-label">NOMBRE COMPLETO:</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user text-muted"></i></span>
                    <input type="text" name="nombre" class="form-control" placeholder="Ej: Juan Pérez" required>
                </div>
            </div>

            <!-- Campo Teléfono -->
            <div class="mb-3">
                <label class="form-label">TELÉFONO / CELULAR:</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-phone-alt text-muted"></i></span>
                    <input type="text" name="telefono" class="form-control" placeholder="310 000 0000" required>
                </div>
            </div>

            <!-- Campo Email -->
            <div class="mb-4">
                <label class="form-label">CORREO ELECTRÓNICO:</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope text-muted"></i></span>
                    <input type="email" name="email" class="form-control" placeholder="correo@ejemplo.com" required>
                </div>
            </div>

            <!-- Botones de Acción -->
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-guardar shadow-sm">
                    <i class="fas fa-save me-2"></i> Guardar Cliente
                </button>
                <a href="{{ url_for('clientes.lista_clientes') }}" class="btn btn-link text-muted text-decoration-none small">
                    <i class="fas fa-arrow-left me-1"></i> Cancelar y volver
                </a>
            </div>
        </form>
    </div>

    <div class="text-center mt-5">
        <p class="text-muted" style="font-size: 0.8rem;">Sistema en construcción 🚀</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
